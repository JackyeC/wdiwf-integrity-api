services:
  - type: web
    name: wdiwf-integrity-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: WDIWF_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
